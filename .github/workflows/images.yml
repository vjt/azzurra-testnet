name: images

# Build and publish bahamut + services images to GHCR so PRs (including upstream
# bahamut / services PRs) can be tested ephemerally without local builds.
#
# Tagging strategy:
#   push master      -> :master + :<sha-of-infra>
#   pull_request     -> :pr-<N>-<sha-of-infra>
#   workflow_dispatch-> :<tag_suffix> (for ad-hoc builds of upstream PRs)
#
# For testing an upstream bahamut PR: trigger workflow_dispatch with
#   ref_bahamut: refs/pull/<N>/head   (or a full SHA)
#   tag_suffix:  bahamut-pr-<N>
# The resulting image is available at ghcr.io/azzurra/bahamut:bahamut-pr-<N>.

on:
  push:
    branches: [main]
    paths:
      - 'bahamut/**'
      - 'services/**'
      - '.github/workflows/images.yml'
  pull_request:
    paths:
      - 'bahamut/**'
      - 'services/**'
      - '.github/workflows/images.yml'
  workflow_dispatch:
    inputs:
      ref_bahamut:
        description: 'bahamut git ref (branch, tag, SHA, or refs/pull/N/head)'
        required: true
        default: 'master'
      ref_services:
        description: 'services git ref (branch, tag, SHA, or refs/pull/N/head)'
        required: true
        default: 'master'
      tag_suffix:
        description: 'tag suffix applied to both images (e.g. bahamut-pr-42)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bahamut
            context: ./bahamut
            build_arg_name: BAHAMUT_REF
          - image: services
            context: ./services
            build_arg_name: SERVICES_REF
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          img="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          case "${{ github.event_name }}" in
            push)
              echo "tags=${img}:main,${img}:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "ref=master" >> "$GITHUB_OUTPUT"
              ;;
            pull_request)
              echo "tags=${img}:pr-${{ github.event.number }}-sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "ref=master" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              suffix="${{ github.event.inputs.tag_suffix }}"
              echo "tags=${img}:${suffix}" >> "$GITHUB_OUTPUT"
              if [ "${{ matrix.image }}" = "bahamut" ]; then
                echo "ref=${{ github.event.inputs.ref_bahamut }}" >> "$GITHUB_OUTPUT"
              else
                echo "ref=${{ github.event.inputs.ref_services }}" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          load: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ${{ matrix.build_arg_name }}=${{ steps.tags.outputs.ref }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
