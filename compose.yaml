name: azzurra-testnet

x-bahamut-build: &bahamut-build
  build:
    context: ./bahamut
    args:
      # TEMPORARY PIN: build bahamut from azzurra/bahamut#26, which fixes an
      # irc_printf integer-format buffer underflow that SIGSEGVs the ircd on an
      # operator/adminserv REHASH (see GH #165). PR refs live on the base repo,
      # so refs/pull/N/head is fetchable via the Dockerfile's azzurra origin.
      # REVERT to `master` once #26 merges upstream (tracked in GH #165).
      BAHAMUT_REF: ${BAHAMUT_REF:-refs/pull/26/head}

services:
  cert-init:
    image: alpine:3.20
    volumes:
      - ./certs:/certs
    command: ["/bin/sh", "/certs/gen-cert.sh"]

  hub:
    <<: *bahamut-build
    container_name: azzurra-hub
    hostname: hub.azzurra.chat
    depends_on:
      cert-init:
        condition: service_completed_successfully
    environment:
      SERVER_ROLE: hub
      SERVER_NAME: hub.azzurra.chat
      SERVER_DESC: "Azzurra testnet hub"
      SERVICES_PASSWORD: ${SERVICES_PASSWORD:-testlink}
      LEAF_PASSWORD: ${LEAF_PASSWORD:-testleaf}
      OPER_NICK: ${OPER_NICK:-testoper}
      OPER_PASS: ${OPER_PASS:-testoperpass}
      LISTEN_PORT: 6667
      LISTEN_SSL_PORT: 6697
      LINK_PORT_V4: ${LINK_PORT_V4:-7000}
      LINK_PORT_V6: ${LINK_PORT_V6:-7001}
      # Static IPs of the peers on each docker network, used as bare IPs in
      # the hub's C/N host fields (parser auto-prepends `*@` per
      # s_conf.c:1660; explicit `*` in the conf gets the line rejected at
      # s_conf.c:1648). Bypasses rDNS, which docker's embedded DNS doesn't
      # implement — gethostbyaddr would return an opaque alias bahamut can't
      # match.
      SERVICES_IP: 172.30.1.3
      LEAF4_IP: 172.30.4.3
      LEAF6_IP: 172.30.6.3
    ports:
      - "6667:6667"
      - "6697:6697"
    volumes:
      - ./certs:/etc/bahamut/certs:ro
    networks:
      svc-net:
        ipv4_address: 172.30.1.2
        aliases: [hub.azzurra.chat]
      leaf4-net:
        ipv4_address: 172.30.4.2
        aliases: [hub.azzurra.chat]
      leaf6-net:
        ipv4_address: 172.30.6.2
        aliases: [hub.azzurra.chat]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6667'"]
      interval: 5s
      timeout: 3s
      retries: 30

  leaf-v4:
    <<: *bahamut-build
    container_name: azzurra-leaf4
    hostname: leaf4.azzurra.chat
    depends_on:
      hub:
        condition: service_healthy
    environment:
      SERVER_ROLE: leaf4
      SERVER_NAME: leaf4.azzurra.chat
      SERVER_DESC: "Azzurra testnet leaf v4"
      HUB: hub.azzurra.chat
      HUB_PORT: ${LINK_PORT_V4:-7000}
      LEAF_PASSWORD: ${LEAF_PASSWORD:-testleaf}
      OPER_NICK: ${OPER_NICK:-testoper}
      OPER_PASS: ${OPER_PASS:-testoperpass}
      LISTEN_PORT: 6667
      LISTEN_SSL_PORT: 6697
    ports:
      - "6668:6667"
      - "6698:6697"
    volumes:
      - ./certs:/etc/bahamut/certs:ro
    networks:
      leaf4-net:
        ipv4_address: 172.30.4.3

  leaf-v6:
    <<: *bahamut-build
    container_name: azzurra-leaf6
    hostname: leaf6.azzurra.chat
    depends_on:
      hub:
        condition: service_healthy
    environment:
      SERVER_ROLE: leaf6
      SERVER_NAME: leaf6.azzurra.chat
      SERVER_DESC: "Azzurra testnet leaf v6"
      HUB: hub.azzurra.chat
      HUB_PORT: ${LINK_PORT_V6:-7001}
      # Bahamut is INET4-only and leaf6-net has enable_ipv6: true, so
      # docker's embedded DNS hands out the hub's ULA AAAA first — which
      # is unreachable from INET4 code and silently kills autoconnect.
      # Use the hub's IPv4 static on leaf6-net so conf.leaf6.tmpl
      # interpolates a bare IP and skips resolver entirely.
      HUB_IP: 172.30.6.2
      LEAF_PASSWORD: ${LEAF_PASSWORD:-testleaf}
      OPER_NICK: ${OPER_NICK:-testoper}
      OPER_PASS: ${OPER_PASS:-testoperpass}
      LISTEN_PORT: 6667
      LISTEN_SSL_PORT: 6697
    ports:
      - "6669:6667"
      - "6699:6697"
    volumes:
      - ./certs:/etc/bahamut/certs:ro
    networks:
      leaf6-net:
        ipv4_address: 172.30.6.3

  services:
    build:
      context: ./services
      args:
        SERVICES_REF: ${SERVICES_REF:-master}
    container_name: azzurra-services
    hostname: services.azzurra.chat
    # Run under tini so services is not PID 1: when launched with -F it
    # would otherwise be the session leader, and main.c's setpgid(0, 0)
    # returns EPERM on a session leader → exit(1). With init: true tini
    # is PID 1 and services becomes a child, so setpgid succeeds.
    init: true
    depends_on:
      hub:
        condition: service_healthy
    environment:
      SERVICES_NAME: services.azzurra.chat
      SERVICES_DESC: "Azzurra IRC Services"
      HUB: hub.azzurra.chat
      HUB_PORT: ${LINK_PORT_V4:-7000}
      SERVICES_PASSWORD: ${SERVICES_PASSWORD:-testlink}
      SERVICES_MASTER: ${OPER_NICK:-testoper}
    volumes:
      - services-data:/var/lib/services
    networks:
      svc-net:
        ipv4_address: 172.30.1.3
        aliases: [services.azzurra.chat]

volumes:
  services-data:

networks:
  svc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
  leaf4-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.4.0/24
  # Bahamut is compiled IPv4-only (options.h #undef INET6), so the leaf6 link
  # runs on an IPv4 subnet even though this bridge has a ULA too (that's just
  # to keep the name honest for a future INET6 rebuild).
  leaf6-net:
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.6.0/24
        - subnet: fd00:a22e::/64
